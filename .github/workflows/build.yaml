name: Build Resume
on:
  push:
    tags:
      - "v*"
      - "release/v*"
permissions:
  contents: write
jobs:
  build_typst_documents:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3
      - uses: fontist/setup-fontist@v2
      - uses: typst-community/setup-typst@v5
      - name: Install Fonts
        run: |
          fontist install "Alegreya Sans"
          fontist install "Inter"
          fontist fontconfig update
      - name: Verify Fonts
        run: |
          fontist status "Alegreya Sans"
          fontist status "Inter"
      - name: Compile
        run: |
          typst compile TasmanVoseResume.typ TasmanVoseResume.pdf
      - name: Get current date
        run: |
          echo "DATE=$(date +%Y-%m-%d)" >> $GITHUB_ENV
      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          name: "${{ github.ref_name }} - ${{ env.DATE }}"
          files: "*.pdf"
